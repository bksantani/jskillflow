name: Security

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '24 3 * * 1'

permissions:
  contents: read

jobs:
  codeql:
    if: github.event_name != 'pull_request'
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language:
          - java
          - javascript-typescript

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  java-dependency-scan:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Audit Java dependencies
        run: mvn -B -DskipTests org.owasp:dependency-check-maven:check

  skills-ui-dependency-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Install skills-ui dependencies
        run: npm ci
        working-directory: skills-ui

      - name: Audit skills-ui dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: skills-ui

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high