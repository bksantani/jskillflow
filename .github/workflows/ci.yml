name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: skills-ui/package-lock.json

      - name: Install skills-ui dependencies
        run: npm ci
        working-directory: skills-ui

      - name: Audit skills-ui dependencies
        run: npm audit --audit-level=high --omit=dev
        working-directory: skills-ui


      - name: Verify Maven build and tests
        run: mvn -B test

