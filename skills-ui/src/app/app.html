<div class="app-container">
  <!-- Top Header -->
  <header class="app-header">
    <div class="brand-section">
      <div class="logo-orb">JS</div>
      <div>
        <h1 class="brand-title">jskillflow</h1>
        <p class="brand-subtitle">Enterprise AI-Agent Skill Registry</p>
      </div>
    </div>

    <!-- Navigation Tabs -->
    <nav class="app-nav">
      <a routerLink="/catalog" routerLinkActive="active" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="9" rx="1"></rect>
          <rect x="14" y="3" width="7" height="5" rx="1"></rect>
          <rect x="14" y="12" width="7" height="9" rx="1"></rect>
          <rect x="3" y="16" width="7" height="5" rx="1"></rect>
        </svg>
        Skill Catalog
      </a>
      <a routerLink="/getting-started" routerLinkActive="active" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
        Getting Started
      </a>
      <a routerLink="/generate" routerLinkActive="active" class="nav-link">
        <svg class="nav-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="18" r="3"></circle>
          <circle cx="6" cy="6" r="3"></circle>
          <circle cx="6" cy="18" r="3"></circle>
          <path d="M18 15V9a4 4 0 0 0-4-4H9"></path>
          <path d="M8 3h0v6h0"></path>
        </svg>
        Generate Skill
      </a>
    </nav>

    <div class="versions-wrapper">
      <div class="version-badge-container">
        <span class="version-label">Registry</span>
        <span class="version-number">{{ registryVersion() }}</span>
      </div>
      <div class="version-badge-container">
        <span class="version-label">Maven Plugin</span>
        <span class="version-number">{{ pluginVersion() }}</span>
      </div>
    </div>
  </header>

  <!-- Router Content Outlet -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
